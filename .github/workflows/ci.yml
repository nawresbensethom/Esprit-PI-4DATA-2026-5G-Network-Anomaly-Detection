name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "moe-ids/**"
      - "dashboard/**"
      - ".github/workflows/ci.yml"
      - "docker-compose.yml"
      - "Makefile"
  pull_request:
    paths:
      - "moe-ids/**"
      - "dashboard/**"
      - ".github/workflows/ci.yml"
      - "docker-compose.yml"
      - "Makefile"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Code quality + security + unit tests on the Python codebase
  # ──────────────────────────────────────────────────────────────────────
  quality:
    name: Lint · Format · Security · Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moe-ids
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: moe-ids/pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,mlflow]"

      - name: Format check (black + ruff)
        run: make format-check
        continue-on-error: true

      - name: Lint (ruff)
        run: make lint

      - name: Security scan (bandit + pip-audit)
        run: make security

      - name: Unit tests
        run: pytest tests/unit -v --cov=moe_ids --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: moe-ids/coverage.xml
          flags: unit
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────
  # Train a smoke-sized model and log it to MLflow inside the runner.
  # Uploads the artefacts so the CD job can package them.
  # ──────────────────────────────────────────────────────────────────────
  model:
    name: Smoke training run + MLflow log
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: moe-ids
    services:
      mlflow_db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
          POSTGRES_DB: mlflow
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U mlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: moe-ids/pyproject.toml

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,mlflow]"
          pip install mlflow psycopg2-binary

      - name: Verify cleaned datasets are present
        run: |
          test -f ../MoE/Global_CLEANED.csv || (echo "::error::Global_CLEANED.csv missing — check git LFS / dataset commit" && exit 1)
          test -f ../MoE/AIoT_6G_CLEANED.csv || (echo "::error::AIoT_6G_CLEANED.csv missing — check git LFS / dataset commit" && exit 1)
          ls -lh ../MoE/

      - name: Start MLflow tracking server
        run: |
          nohup mlflow server \
            --backend-store-uri postgresql://mlflow:mlflow@localhost:5433/mlflow \
            --default-artifact-root /tmp/mlruns \
            --host 0.0.0.0 --port 5000 > /tmp/mlflow.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              echo "MLflow up after ${i} attempts"; break
            fi
            sleep 2
          done
          curl -fsS http://localhost:5000/health

      - name: Train (smoke-sized) and log to MLflow
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          PYTHONUTF8: "1"
        run: |
          python scripts/train.py \
            --data-5g ../MoE/Global_CLEANED.csv \
            --data-6g ../MoE/AIoT_6G_CLEANED.csv \
            --artefacts-dir artefacts/ci \
            --seed 42 \
            --ae-epochs 2 \
            --gate-epochs 2 \
            --xgb-n-estimators 20 \
            --mlflow-tracking-uri http://localhost:5000 \
            --experiment unified_moe_ci \
            --no-pushgateway

      - name: Upload trained artefacts
        uses: actions/upload-artifact@v4
        with:
          name: artefacts-ci
          path: moe-ids/artefacts/ci/
          retention-days: 7

      - name: Dump MLflow log on failure
        if: failure()
        run: tail -200 /tmp/mlflow.log || true

  # ──────────────────────────────────────────────────────────────────────
  # Trivy filesystem scan — catches vulnerable deps in lock files + Dockerfiles
  # ──────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────
  # Slack notification on CI failure (best-effort, no-op without secret)
  # ──────────────────────────────────────────────────────────────────────
  notify-on-failure:
    name: Slack notify (CI failure only)
    if: failure()
    needs: [quality, model, trivy-fs]
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "$(cat <<EOF
          {
            "attachments": [{
              "color": "danger",
              "title": ":x: CI failed on ${{ github.ref_name }}",
              "fields": [
                {"title": "Commit",  "value": "${{ github.sha }}", "short": true},
                {"title": "Author",  "value": "${{ github.actor }}", "short": true},
                {"title": "Quality", "value": "${{ needs.quality.result }}", "short": true},
                {"title": "Model",   "value": "${{ needs.model.result }}", "short": true},
                {"title": "Trivy",   "value": "${{ needs.trivy-fs.result }}", "short": true}
              ],
              "footer": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }]
          }
          EOF
          )" "$SLACK_WEBHOOK_URL"

  # ──────────────────────────────────────────────────────────────────────
  # Frontend type-check + production build
  # ──────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/frontend/package.json

      - name: Install dependencies
        run: npm install --no-audit --prefer-offline

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8090
        run: npm run build
