<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SENTRA · 6G Anomaly Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* SENTRA — Attack Detection Dashboard */
:root {
  --bg: #fafaf9;
  --bg-elev: #ffffff;
  --bg-subtle: #f4f4f2;
  --bg-hover: #f0efec;
  --fg: #18181b;
  --fg-muted: #71717a;
  --fg-subtle: #a1a1aa;
  --line: #e6e6e3;
  --line-strong: #d4d4d0;
  --accent: oklch(0.55 0.15 255);
  --accent-fg: #ffffff;
  --accent-soft: oklch(0.95 0.04 255);
  --accent-border: oklch(0.85 0.08 255);
  --critical: oklch(0.58 0.18 25);
  --critical-soft: oklch(0.96 0.03 25);
  --critical-border: oklch(0.85 0.08 25);
  --warn-fg: oklch(0.60 0.14 60);
  --warn-soft: oklch(0.97 0.04 85);
  --warn-border: oklch(0.85 0.09 80);
  --ok: oklch(0.58 0.12 155);
  --ok-soft: oklch(0.96 0.03 155);
  --ok-border: oklch(0.82 0.07 155);
  --benign: oklch(0.58 0.12 155);
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.06);
}

[data-theme="dark"] {
  --bg: #0a0a0a;
  --bg-elev: #121212;
  --bg-subtle: #161616;
  --bg-hover: #1c1c1c;
  --fg: #fafafa;
  --fg-muted: #a1a1aa;
  --fg-subtle: #71717a;
  --line: #222222;
  --line-strong: #2a2a2a;
  --accent: oklch(0.72 0.16 255);
  --accent-fg: #0a0a0a;
  --accent-soft: oklch(0.28 0.06 255);
  --accent-border: oklch(0.38 0.08 255);
  --critical: oklch(0.70 0.19 25);
  --critical-soft: oklch(0.24 0.06 25);
  --critical-border: oklch(0.36 0.10 25);
  --warn-fg: oklch(0.78 0.15 75);
  --warn-soft: oklch(0.24 0.04 75);
  --warn-border: oklch(0.36 0.08 75);
  --ok: oklch(0.72 0.14 155);
  --ok-soft: oklch(0.22 0.04 155);
  --ok-border: oklch(0.36 0.08 155);
  --benign: oklch(0.72 0.14 155);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow: 0 1px 3px rgba(0,0,0,.35);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.5);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv02","cv03","cv04","cv11";
}
button, input, select { font: inherit; color: inherit; }

.mono { font-family: var(--mono); font-feature-settings: "tnum" 1; }
.num { font-family: var(--mono); font-feature-settings: "tnum" 1; }

/* App shell */
.app { display: grid; grid-template-columns: 216px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--bg);
  border-right: 1px solid var(--line);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 2px;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.brand {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px 14px;
  color: var(--fg);
}
.brand-name {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
}
.brand-tag {
  font-size: 10px;
  color: var(--fg-subtle);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-left: auto;
  font-family: var(--mono);
}
.nav-section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--fg-subtle); padding: 12px 8px 4px;
  font-weight: 500;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px; border-radius: 6px;
  color: var(--fg-muted);
  cursor: pointer;
  font-size: 13px;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--fg); }
.nav-item.active { background: var(--bg-hover); color: var(--fg); }
.nav-item .nav-count {
  margin-left: auto;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--fg-subtle);
  background: var(--bg-subtle);
  padding: 1px 6px; border-radius: 10px;
}
.nav-item.active .nav-count { background: var(--accent-soft); color: var(--accent); }

.sidebar-footer {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}
.user-card {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 6px;
  border-radius: 6px;
  cursor: pointer;
}
.user-card:hover { background: var(--bg-hover); }
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.user-info { min-width: 0; flex: 1; }
.user-name { font-size: 12px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--mono); }

/* Main */
.main { min-width: 0; display: flex; flex-direction: column; }
.topbar {
  height: 48px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 18px;
  gap: 14px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}
.crumbs { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fg-muted); }
.crumbs .sep { color: var(--fg-subtle); }
.crumbs .cur { color: var(--fg); font-weight: 500; }

.topbar-spacer { flex: 1; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-subtle);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 4px 10px;
  width: 260px;
  color: var(--fg-muted);
}
.search-box input {
  background: transparent; border: 0; outline: 0;
  flex: 1; font-size: 12px;
  color: var(--fg);
}
.search-box input::placeholder { color: var(--fg-subtle); }
.search-box .kbd {
  font-family: var(--mono); font-size: 10px;
  color: var(--fg-subtle);
  border: 1px solid var(--line-strong); border-radius: 3px;
  padding: 0 4px;
}

.icon-btn {
  background: transparent; border: 1px solid transparent;
  border-radius: 6px; width: 28px; height: 28px;
  display: grid; place-items: center;
  color: var(--fg-muted); cursor: pointer;
  position: relative;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--fg); border-color: var(--line); }
.icon-btn .dot-ind {
  position: absolute; top: 5px; right: 5px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--critical); border: 1.5px solid var(--bg);
}

.page {
  padding: 20px 22px;
  max-width: 1600px;
  width: 100%;
}
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 16px; gap: 16px;
}
.page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
.page-desc { color: var(--fg-muted); font-size: 13px; margin-top: 2px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

/* Panel */
.panel {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}
.panel-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}
.panel-title { font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
.panel-sub { font-size: 11px; color: var(--fg-subtle); margin-top: 1px; }
.panel-actions { display: flex; gap: 6px; align-items: center; }
.panel-body { padding: 14px; }

/* KPI */
.grid { display: grid; gap: 12px; }
.kpi {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  position: relative;
}
.kpi-accent { border-color: var(--accent-border); background: linear-gradient(180deg, var(--accent-soft) 0%, var(--bg-elev) 60%); }
.kpi-label { font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.kpi-value { font-family: var(--mono); font-size: 26px; font-weight: 500; letter-spacing: -0.02em; margin-top: 2px; line-height: 1.1; }
.kpi-sub { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--fg-muted); }
.kpi-delta { display: inline-flex; align-items: center; gap: 2px; font-family: var(--mono); font-size: 11px; }
.kpi-delta.up { color: var(--critical); }
.kpi-delta.down { color: var(--ok); }
.kpi-note { color: var(--fg-subtle); }

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: 0.04em;
  border: 1px solid;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.badge-default { background: var(--bg-subtle); color: var(--fg-muted); border-color: var(--line); }
.badge-accent { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.badge-critical { background: var(--critical-soft); color: var(--critical); border-color: var(--critical-border); }
.badge-warn { background: var(--warn-soft); color: var(--warn-fg); border-color: var(--warn-border); }
.badge-ok { background: var(--ok-soft); color: var(--ok); border-color: var(--ok-border); }
.badge-benign { background: var(--ok-soft); color: var(--ok); border-color: var(--ok-border); }

/* Button */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 10px; height: 28px;
  border-radius: 6px;
  font-size: 12px; font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background .1s;
}
.btn-sm { height: 24px; font-size: 11px; padding: 0 8px; gap: 4px; }
.btn-lg { height: 34px; font-size: 13px; padding: 0 14px; }
.btn-default { background: var(--bg-elev); color: var(--fg); border-color: var(--line-strong); }
.btn-default:hover { background: var(--bg-hover); }
.btn-primary { background: var(--fg); color: var(--bg); }
.btn-primary:hover { opacity: .88; }
.btn-accent { background: var(--accent); color: var(--accent-fg); }
.btn-accent:hover { opacity: .9; }
.btn-ghost { background: transparent; color: var(--fg-muted); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--fg); }
.btn-danger { background: var(--bg-elev); color: var(--critical); border-color: var(--critical-border); }
.btn-danger:hover { background: var(--critical-soft); }
.btn[disabled] { opacity: .5; cursor: not-allowed; }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th {
  text-align: left; font-weight: 500;
  padding: 8px 12px;
  color: var(--fg-subtle);
  text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
  background: var(--bg-elev);
  position: sticky; top: 0;
}
.tbl th.sortable { cursor: pointer; user-select: none; }
.tbl th.sortable:hover { color: var(--fg); }
.tbl th.sorted { color: var(--fg); }
.tbl td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
.tbl tr { transition: background .08s; }
.tbl tr:hover td { background: var(--bg-subtle); }
.tbl tr.clickable { cursor: pointer; }
.tbl tr.selected td { background: var(--accent-soft); }
.tbl td.num, .tbl th.num { text-align: right; font-family: var(--mono); }
.tbl-wrap { overflow-x: auto; }

/* Chart labels */
.chart-label { font-size: 9px; font-family: var(--mono); fill: var(--fg-subtle); }

/* Hbar */
.hbar { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
.hbar-label { width: 140px; font-size: 11px; color: var(--fg-muted); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hbar-track { flex: 1; height: 6px; background: var(--bg-subtle); border-radius: 2px; position: relative; }
.hbar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.hbar-val { font-family: var(--mono); font-size: 11px; color: var(--fg); width: 54px; text-align: right; }

/* Login */
.login-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
}
.login-side {
  background: var(--bg-subtle);
  border-right: 1px solid var(--line);
  padding: 36px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.login-side::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 24px 24px;
  opacity: .5;
  mask-image: radial-gradient(circle at 30% 40%, #000 30%, transparent 70%);
  pointer-events: none;
}
.login-side > * { position: relative; }
.login-form-wrap {
  display: grid; place-items: center;
  padding: 36px;
}
.login-form {
  width: 100%; max-width: 340px;
}
.login-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px; }
.login-sub { color: var(--fg-muted); font-size: 13px; margin-bottom: 28px; }
.form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-label { font-size: 11px; color: var(--fg-muted); font-weight: 500; letter-spacing: 0.02em; }
.form-input, .form-select {
  height: 34px; padding: 0 10px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--bg-elev);
  font-size: 13px;
  color: var(--fg);
  outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.form-hint { font-size: 11px; color: var(--fg-subtle); margin-top: 4px; }

.hero-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px;
  font-family: var(--mono);
  font-size: 12px;
  box-shadow: var(--shadow-lg);
  width: min(460px, 100%);
}
.hero-card .row { display: flex; justify-content: space-between; padding: 4px 0; color: var(--fg-muted); }
.hero-card .row .v { color: var(--fg); }

/* Dashboard grid */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}
.span-3 { grid-column: span 3; }
.span-4 { grid-column: span 4; }
.span-5 { grid-column: span 5; }
.span-6 { grid-column: span 6; }
.span-7 { grid-column: span 7; }
.span-8 { grid-column: span 8; }
.span-9 { grid-column: span 9; }
.span-12 { grid-column: span 12; }

/* Upload */
.dropzone {
  border: 1.5px dashed var(--line-strong);
  border-radius: 10px;
  padding: 48px 20px;
  text-align: center;
  background: var(--bg-subtle);
  cursor: pointer;
  transition: all .15s;
}
.dropzone:hover, .dropzone.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.dropzone-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg-elev); border: 1px solid var(--line);
  display: grid; place-items: center;
  margin: 0 auto 12px;
  color: var(--accent);
}

/* Job progress steps */
.steps { display: flex; align-items: center; gap: 4px; }
.step {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px;
  font-size: 11px; color: var(--fg-muted);
  font-family: var(--mono);
  flex: 1;
  border: 1px solid var(--line);
  background: var(--bg);
}
.step.done { color: var(--ok); border-color: var(--ok-border); background: var(--ok-soft); }
.step.active { color: var(--accent); border-color: var(--accent-border); background: var(--accent-soft); }
.step.failed { color: var(--critical); border-color: var(--critical-border); background: var(--critical-soft); }
.step-dot {
  width: 14px; height: 14px; border-radius: 50%;
  display: grid; place-items: center;
  background: var(--bg-subtle);
  border: 1px solid var(--line-strong);
  flex-shrink: 0;
}
.step.done .step-dot { background: var(--ok); border-color: var(--ok); color: #fff; }
.step.active .step-dot { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
.step.active .step-dot { animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--accent-soft); } 50% { box-shadow: 0 0 0 6px transparent; } }

.progress-bar {
  width: 100%; height: 4px; background: var(--bg-subtle); border-radius: 2px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--accent); transition: width .3s;
}

/* Drift / Alert */
.alert {
  display: flex; gap: 10px;
  padding: 10px 14px;
  border: 1px solid;
  border-radius: 8px;
  font-size: 12px;
  align-items: flex-start;
}
.alert-warn { background: var(--warn-soft); border-color: var(--warn-border); color: var(--warn-fg); }
.alert-crit { background: var(--critical-soft); border-color: var(--critical-border); color: var(--critical); }
.alert-info { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }
.alert-title { font-weight: 600; margin-bottom: 2px; color: var(--fg); }
.alert-body { color: var(--fg-muted); }
.alert-actions { margin-left: auto; display: flex; gap: 6px; }

/* Toggle */
.toggle {
  width: 30px; height: 18px;
  background: var(--bg-subtle);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  transition: all .15s;
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle-thumb {
  position: absolute; top: 1px; left: 1px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff;
  transition: transform .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,.15);
}
.toggle.on .toggle-thumb { transform: translateX(12px); }

/* Slider */
.slider {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--bg-subtle);
  border-radius: 2px;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--fg);
  border-radius: 50%;
  cursor: pointer;
}
.slider::-moz-range-thumb {
  width: 14px; height: 14px;
  background: var(--fg);
  border-radius: 50%;
  cursor: pointer;
  border: 0;
}

/* SHAP waterfall */
.shap-row { display: grid; grid-template-columns: 110px 1fr 60px; gap: 10px; align-items: center; padding: 3px 0; }
.shap-label { font-family: var(--mono); font-size: 11px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shap-bar { position: relative; height: 14px; }
.shap-bar::before {
  content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px;
  background: var(--line-strong);
}
.shap-bar-pos, .shap-bar-neg { position: absolute; top: 2px; bottom: 2px; border-radius: 2px; }
.shap-bar-pos { background: var(--critical); left: 50%; }
.shap-bar-neg { background: var(--ok); right: 50%; }
.shap-val { font-family: var(--mono); font-size: 11px; text-align: right; color: var(--fg-muted); }

/* Dropdown menu */
.menu {
  position: absolute;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  padding: 4px;
  min-width: 180px;
  z-index: 100;
}
.menu-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  color: var(--fg);
}
.menu-item:hover { background: var(--bg-hover); }
.menu-item.destructive { color: var(--critical); }
.menu-divider { height: 1px; background: var(--line); margin: 4px 0; }
.menu-label { font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; padding: 4px 10px; font-family: var(--mono); letter-spacing: 0.06em; }

/* Modal */
.modal-backdrop {

  ];

  function genIP() {
    return `10.${(rand()*255)|0}.${(rand()*255)|0}.${(rand()*255)|0}`;

      id: `p_${1000+i}`,
      row: i,
      src: genIP(),
      dst: genIP(),
      proto: ['TCP','UDP','ICMP','TCP','TCP'][(rand()*5)|0],

      bytes: ((rand()*8000)|0) + 64,
      pkts: ((rand()*120)|0) + 1,

      clsLabel: cls.label,
      clsColor: cls.color,
      conf: +conf.toFixed(4),
      ts: Date.now() - i * 1000 * (30 + rand()*90),

  // Distribution
  const classDist = {};

    const rows = 1200 + ((rand()*40000)|0);
    const attackRate = 0.08 + rand() * 0.45;
    const status = STATUSES[i];
    return {
      id: `job_${(8423 + i).toString(16)}`,
      filename: f,
      rows,
      attackRate: +attackRate.toFixed(3),
      attacks: Math.round(rows * attackRate),
      status,
      created: Date.now() - i * 1000 * 60 * (45 + rand()*300),
      duration: 8 + ((rand()*240)|0),
      drift: i === 2 || i === 5,
      fairness: i === 7,
      model: i % 3 === 0 ? 'xgboost-5g-v2.1' : 'autoencoder-6g-v1.4',
      slice: SLICES[(rand()*3)|0],
    };
  });

  // SHAP values for a sample
  const shap = [
    { feature: 'SrcBytes_log', value: 0.34, abs: 0.34 },
    { feature: 'Rate_log', value: 0.21, abs: 0.21 },
    { feature: 'SynAck_log', value: 0.18, abs: 0.18 },
    { feature: 'TcpRtt_log', value: -0.12, abs: 0.12 },
    { feature: 'sTtl', value: 0.09, abs: 0.09 },
    { feature: 'State_RST', value: 0.07, abs: 0.07 },
    { feature: 'sHops', value: -0.06, abs: 0.06 },
    { feature: 'Proto_udp', value: 0.04, abs: 0.04 },
    { feature: 'SrcLoss_ratio', value: -0.03, abs: 0.03 },
    { feature: 'DstTCPBase', value: 0.02, abs: 0.02 },
  ];

  // Users for admin page
  const users = [
    { id: 'u1', name: 'Admin User', email: 'admin@sentra.io', role: 'admin', active: true, last: Date.now() - 1000*60*3 },
    { id: 'u2', name: 'Leïla Ben Amor', email: 'leila.ba@sentra.io', role: 'analyst', active: true, last: Date.now() - 1000*60*18 },
    { id: 'u3', name: 'Marcus Odili', email: 'm.odili@sentra.io', role: 'analyst', active: true, last: Date.now() - 1000*60*120 },
    { id: 'u4', name: 'Yuki Tanaka', email: 'y.tanaka@sentra.io', role: 'ml_engineer', active: true, last: Date.now() - 1000*60*60*6 },
    { id: 'u5', name: 'Rania Kacem', email: 'r.kacem@sentra.io', role: 'analyst', active: false, last: Date.now() - 1000*60*60*24*14 },
    { id: 'u6', name: 'Dmitri Volkov', email: 'd.volkov@sentra.io', role: 'ml_engineer', active: true, last: Date.now() - 1000*60*60*48 },
    { id: 'u7', name: 'Sara Nouri', email: 's.nouri@sentra.io', role: 'analyst', active: true, last: Date.now() - 1000*60*34 },
  ];

  // Drift report
  const drift = {
    triggered: true,
    features: [
      { name: 'Rate_log', ks: 0.31, p: 0.003, drifted: true },
      { name: 'SrcBytes_log', ks: 0.24, p: 0.012, drifted: true },
      { name: 'SynAck_log', ks: 0.19, p: 0.041, drifted: true },
      { name: 'TcpRtt_log', ks: 0.11, p: 0.089, drifted: false },
      { name: 'sTtl', ks: 0.08, p: 0.21, drifted: false },
    ],

  // Fairness
  const fairness = [
    { slice: 'URLLC', recall: 0.94, precision: 0.91, support: 12430 },

    { slice: 'mMTC', recall: 0.72, precision: 0.81, support: 9842 },

  return {
    ATTACK_TYPES, SLICES, FEATURES,
    predictions, classDist, confBuckets, trend,
    jobs, shap, users, drift, fairness,

})();

  const Y = v => padT + (1 - (v - min)/(max - min || 1)) * (height - padT - padB);
  return (
    <svg viewBox={`0 0 ${w} ${height}`} style={{ width:'100%', height, display:'block' }}>
      {yLabels && [0, .5, 1].map((t, i) => {
        const y = padT + t * (height - padT - padB);
        const v = max - t * (max - min);
        return <g key={i}>
          <line x1={padL} x2={w-padR} y1={y} y2={y} stroke="var(--line)" strokeDasharray="2 3" opacity=".6"/>
          <text x={padL-4} y={y+3} textAnchor="end" className="chart-label">{fmtN(v)}</text>
        </g>;
      })}
      {series.map((s, i) => {
        const path = 'M ' + s.data.map((p, j) => `${X(j)},${Y(p.y)}`).join(' L ');
        const area = path + ` L ${X(xMax)},${Y(0)} L ${X(0)},${Y(0)} Z`;
        return <g key={i}>
          {s.style === 'area' && <path d={area} fill={s.color} opacity=".1"/>}
          <path d={path} stroke={s.color} strokeWidth="1.4" fill="none"/>
        </g>;
      })}
      {series[0].data.map((p, j) => (
        j % Math.ceil(xMax/6) === 0 && <text key={j} x={X(j)} y={height-6} textAnchor="middle" className="chart-label">{p.label || p.x}</text>
      ))}
      {annotations.map((a,i) => (
        <g key={i}>
          <line x1={X(a.x)} x2={X(a.x)} y1={padT} y2={height-padB} stroke="var(--warn-fg)" strokeDasharray="3 2" opacity=".7"/>
          <text x={X(a.x)+3} y={padT+10} className="chart-label" fill="var(--warn-fg)">{a.label}</text>
        </g>
      ))}
    </svg>
  );
}

// Horizontal bar
function HBar({ data, max, color='var(--accent)', height=14, label, value }) {
  const pct = Math.min(100, (data/max)*100);
  return (
    <div className="hbar">
      {label && <div className="hbar-label">{label}</div>}
      <div className="hbar-track">
        <div className="hbar-fill" style={{ width: pct+'%', background: color }}/>
      </div>
      {value && <div className="hbar-val">{value}</div>}
    </div>
  );
}

// Donut
function Donut({ segments, size=140, thickness=16 }) {
  // segments: [{ label, value, color }]
  const total = segments.reduce((s, x) => s + x.value, 0);
  const r = (size - thickness)/2;
  const c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--line)" strokeWidth={thickness}/>
      {segments.map((s, i) => {
        const len = (s.value/total) * c;
        const dash = `${len} ${c-len}`;
        const el = <circle key={i} cx={size/2} cy={size/2} r={r} fill="none"
          stroke={s.color} strokeWidth={thickness}
          strokeDasharray={dash} strokeDashoffset={-offset}
          transform={`rotate(-90 ${size/2} ${size/2})`}/>;
        offset += len;
        return el;
      })}
    </svg>
  );
}

          {shap.map((s, i) => {
            const pctAbs = (s.abs/maxAbs)*48;
            return <div key={i} className="shap-row">
              <div className="shap-label">{s.feature}</div>
              <div className="shap-bar">
                {s.value > 0 && <div className="shap-bar-pos" style={{ width: pctAbs+'%' }}/>}
                {s.value < 0 && <div className="shap-bar-neg" style={{ width: pctAbs+'%' }}/>}
              </div>
              <div className="shap-val">{s.value > 0 ? '+' : ''}{s.value.toFixed(3)}</div>
            </div>;
          })}

          <div className="divider"/>
          <div className="panel-sub" style={{ textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Raw scores</div>
          <div className="mono" style={{ fontSize: 12, background: 'var(--bg-subtle)', padding: 12, borderRadius: 6, border: '1px solid var(--line)', lineHeight: 1.7 }}>
            <div><span className="muted">benign            </span>{(1-p.conf).toFixed(4)}</div>
            <div><span className="muted">malicious         </span>{p.conf.toFixed(4)}</div>
            <div><span className="muted">inference_time_ms </span>{(20 + (p.row%50)).toFixed(0)}</div>
            <div><span className="muted">model_version     </span>"autoencoder-6g-v1.4"</div>
          </div>

          <div className="divider"/>
          <div className="panel-sub" style={{ textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Recommended action</div>
          <div className="alert alert-crit" style={{ marginBottom: 8 }}>
            <Icon name="warn" size={14}/>
            <div><div className="alert-title">Isolate source address</div>
              <div className="alert-body">This flow exhibits high rate_log and anomalous SynAck_log, consistent with SYN-flood DDoS.</div>
            </div>
          </div>
          <div className="row" style={{ gap: 6 }}>
            <Button variant="danger" size="sm">Isolate host</Button>
            <Button variant="default" size="sm">Add to watchlist</Button>
            <Button variant="ghost" size="sm">Mark false positive</Button>
          </div>
        </div>
      </div>
    </>
  );
}

<script type="text/babel" data-presets="react">
// Upload page + history + admin + drift
function UploadPage({ data, onComplete, onNavigate }) {
  const [stage, setStage] = useState('idle'); // idle, validating, invalid, ready, uploading, pending, running, completed
  const [file, setFile] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [progress, setProgress] = useState(0);
  const [errors, setErrors] = useState([]);
  const [validateMode, setValidateMode] = useState('valid'); // 'valid' or 'invalid'
  const inputRef = useRef();

  function pick() { inputRef.current?.click(); }

  function handleFile(f) {
    const name = f?.name || 'cicflow_6g_urllc_2026-04-20.csv';
    const size = f?.size || 2845312;
    setFile({ name, size, rows: 14456, cols: 64 });
    setStage('validating');
    setTimeout(() => {
      if (validateMode === 'invalid') {
        setErrors([
          'Missing required column: SynAck_log',
          'Column sTtl contains 127 non-numeric values',
          '8.2% of rows are fully null (threshold: 10%)',
        ]);
        setStage('invalid');
      } else {
        setErrors([]);
        setStage('ready');
      }
    }, 900);
  }

  function startUpload() {
    setStage('uploading');
    setProgress(0);
    const iv = setInterval(() => {
      setProgress(p => {
        const np = p + 8 + Math.random()*10;
        if (np >= 100) { clearInterval(iv); setStage('pending'); setTimeout(() => setStage('running'), 700); return 100; }
        return np;
      });
    }, 140);
  }

  // auto-advance running → completed
  useEffect(() => {
    if (stage === 'running') {
      const t = setTimeout(() => setStage('completed'), 3800);
      return () => clearTimeout(t);
    }
  }, [stage]);

  function reset() {
    setStage('idle'); setFile(null); setErrors([]); setProgress(0);
  }

  const steps = [
    { key: 'pending', label: 'Queued' },
    { key: 'running', label: 'Fetching from MinIO' },
    { key: 'inference', label: 'Running inference' },
    { key: 'persisting', label: 'Persisting results' },
    { key: 'completed', label: 'Complete' },
  ];
  const stageOrder = ['idle','validating','ready','uploading','pending','running','completed'];
  const stageIdx = stageOrder.indexOf(stage);

  function stepState(i) {
    if (stage === 'completed') return 'done';
    if (stage === 'running' && i < 3) return i < 2 ? 'done' : 'active';
    if (stage === 'pending' && i === 0) return 'active';
    if (stage === 'pending' && i < 0) return 'done';
    return 'idle';
  }

  return <>
    <div className="page-head">
      <div>
        <h1 className="page-title">New scan</h1>
        <div className="page-desc">Upload a CSV of 5G/6G network flows. Max 50 MB · up to 100,000 rows.</div>
      </div>
      <div className="page-actions">
        <div className="tweak-chips" style={{ marginRight: 4 }}>
          <span className="subtle" style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', alignSelf: 'center', marginRight: 6 }}>demo validation</span>
          <button className={cls('tweak-chip', validateMode==='valid' && 'on')} onClick={()=>setValidateMode('valid')}>valid</button>
          <button className={cls('tweak-chip', validateMode==='invalid' && 'on')} onClick={()=>setValidateMode('invalid')}>invalid</button>
        </div>
      </div>
    </div>

    <div className="grid dash-grid">
      <div className="span-8">
        <Panel title="Upload" padding={false}>
          <div style={{ padding: 16 }}>
            {(stage === 'idle' || stage === 'validating' || stage === 'invalid' || stage === 'ready') && (
              <div className={cls('dropzone', dragging && 'active')}
                onClick={pick}
                onDragOver={e => { e.preventDefault(); setDragging(true); }}
                onDragLeave={() => setDragging(false)}
                onDrop={e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}>
                <input ref={inputRef} type="file" accept=".csv" style={{ display: 'none' }}
                  onChange={e => e.target.files[0] && handleFile(e.target.files[0])}/>
                <div className="dropzone-icon"><Icon name="upload" size={20}/></div>
                <div style={{ fontSize: 14, fontWeight: 500 }}>Drop CSV file here</div>
                <div className="muted" style={{ fontSize: 12, marginTop: 4 }}>or click to browse · accepts <span className="mono">.csv</span> up to 50MB</div>
                <div className="row" style={{ justifyContent: 'center', gap: 6, marginTop: 14 }}>
                  <span className="tag">sTtl</span><span className="tag">dTtl</span><span className="tag">Rate_log</span><span className="tag">SrcBytes_log</span><span className="tag muted">+60 more</span>
                </div>
              </div>
            )}

            {file && stage !== 'idle' && (
              <div className="panel" style={{ marginTop: 14, border: '1px solid var(--line)' }}>
                <div className="row" style={{ padding: 12, gap: 12 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 6, background: 'var(--bg-subtle)', display: 'grid', placeItems: 'center', color: 'var(--fg-muted)', flexShrink: 0 }}>
                    <Icon name="file" size={18}/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="mono" style={{ fontSize: 12, fontWeight: 500 }}>{file.name}</div>
                    <div className="muted" style={{ fontSize: 11 }}>
                      {(file.size/1024/1024).toFixed(2)} MB · {file.rows.toLocaleString()} rows × {file.cols} cols
                      {stage === 'validating' && <> · <span style={{ color: 'var(--accent)' }}>validating schema…</span></>}
                      {stage === 'ready' && <> · <span style={{ color: 'var(--ok)' }}>schema valid</span></>}
                      {stage === 'invalid' && <> · <span style={{ color: 'var(--critical)' }}>{errors.length} error{errors.length!==1?'s':''}</span></>}
                    </div>
                  </div>
                  <button className="icon-btn" onClick={reset}><Icon name="x"/></button>
                </div>
              </div>
            )}

            {stage === 'invalid' && (
              <div className="alert alert-crit" style={{ marginTop: 10 }}>
                <Icon name="warn" size={16}/>
                <div>
                  <div className="alert-title">Validation failed</div>
                  <ul style={{ margin: '4px 0 0', paddingLeft: 18, fontSize: 12 }}>
                    {errors.map((e,i) => <li key={i} style={{ color: 'var(--fg-muted)' }}>{e}</li>)}
                  </ul>
                </div>
              </div>
            )}

            {(stage === 'ready' || stage === 'uploading' || stage === 'pending' || stage === 'running' || stage === 'completed') && (
              <div style={{ marginTop: 12 }}>
                <div className="row" style={{ marginBottom: 10, justifyContent: 'space-between' }}>
                  <div className="panel-sub" style={{ textTransform: 'uppercase', letterSpacing: '0.06em' }}>Job pipeline</div>
                  <span className="mono muted" style={{ fontSize: 11 }}>
                    {stage === 'completed' ? 'job_a3f1 · 2m 14s' : stage === 'running' ? 'job_a3f1 · running' : 'job_a3f1 · pending'}
                  </span>
                </div>
                <div className="steps">
                  {steps.map((s, i) => {
                    let state = 'idle';
                    if (stage === 'completed') state = 'done';
                    else if (stage === 'running' && i <= 2) state = i < 2 ? 'done' : 'active';
                    else if (stage === 'pending' && i === 0) state = 'active';
                    else if (stage === 'uploading' && i === 0) state = 'active';
                    return <div key={s.key} className={cls('step', state)}>
                      <div className="step-dot">
                        {state === 'done' && <Icon name="check" size={10}/>}
                      </div>
                      <span>{s.label}</span>
                    </div>;
                  })}
                </div>
                {stage === 'uploading' && (
                  <div style={{ marginTop: 10 }}>
                    <div className="row" style={{ justifyContent: 'space-between', fontSize: 11, marginBottom: 4 }}>
                      <span className="muted">Uploading to MinIO…</span>
                      <span className="mono">{progress.toFixed(0)}%</span>
                    </div>
                    <div className="progress-bar"><div className="progress-bar-fill" style={{ width: progress+'%' }}/></div>
                  </div>
                )}
              </div>
            )}

            <div className="row" style={{ marginTop: 14, justifyContent: 'flex-end', gap: 8 }}>
              {stage === 'ready' && <>
                <Button variant="ghost" onClick={reset}>Cancel</Button>
                <Button variant="primary" icon="play" onClick={startUpload}>Start prediction</Button>
              </>}
              {stage === 'invalid' && <Button variant="default" onClick={reset}>Choose another file</Button>}
              {stage === 'completed' && <>
                <Button variant="ghost" onClick={reset}>New scan</Button>
                <Button variant="primary" onClick={() => onNavigate('results')}>View results →</Button>
              </>}
            </div>
          </div>
        </Panel>
      </div>

      <div className="span-4">
        <Panel title="Schema requirements" subtitle="CSV columns & constraints">
          <div style={{ fontSize: 12, lineHeight: 1.8 }}>
            <div className="row"><Icon name="check" size={14} style={{ color: 'var(--ok)' }}/><span className="muted">Extension</span><span className="mono" style={{ marginLeft: 'auto' }}>.csv</span></div>
            <div className="row"><Icon name="check" size={14} style={{ color: 'var(--ok)' }}/><span className="muted">Max size</span><span className="mono" style={{ marginLeft: 'auto' }}>50 MB</span></div>
            <div className="row"><Icon name="check" size={14} style={{ color: 'var(--ok)' }}/><span className="muted">Max rows</span><span className="mono" style={{ marginLeft: 'auto' }}>100,000</span></div>
            <div className="row"><Icon name="check" size={14} style={{ color: 'var(--ok)' }}/><span className="muted">Null tolerance</span><span className="mono" style={{ marginLeft: 'auto' }}>≤ 10%</span></div>
            <div className="row"><Icon name="check" size={14} style={{ color: 'var(--ok)' }}/><span className="muted">Required cols</span><span className="mono" style={{ marginLeft: 'auto' }}>64 (5G) / 75 (6G)</span></div>
          </div>
          <div className="divider"/>
          <div className="panel-sub" style={{ textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>First 8 features</div>
          <div className="row" style={{ flexWrap: 'wrap', gap: 4 }}>
            {data.FEATURES.slice(0,16).map(f => <span key={f} className="tag">{f}</span>)}
          </div>
          <div className="divider"/>
          <div className="hlink" style={{ fontSize: 11 }}>Download template CSV →</div>
        </Panel>

        <div style={{ height: 12 }}/>

        <Panel title="Detection model" subtitle="active endpoint">
          <div className="mono" style={{ fontSize: 12, lineHeight: 1.9 }}>
            <div className="row"><span className="muted">model</span><span style={{ marginLeft: 'auto' }}>autoencoder-6g-v1.4</span></div>
            <div className="row"><span className="muted">algorithm</span><span style={{ marginLeft: 'auto' }}>Variational AE</span></div>
            <div className="row"><span className="muted">features</span><span style={{ marginLeft: 'auto' }}>75</span></div>
            <div className="row"><span className="muted">trained</span><span style={{ marginLeft: 'auto' }}>2026-03-12</span></div>
            <div className="row"><span className="muted">endpoint</span><Badge tone="ok" dot>healthy</Badge></div>
          </div>
        </Panel>
      </div>
    </div>
  </>;
}

// ─────────── History ───────────
function HistoryPage({ data, onNavigate }) {
  const [sortKey, setSortKey] = useState('created');
  const [sortDir, setSortDir] = useState('desc');
  const [filter, setFilter] = useState('all');

  const filtered = data.jobs.filter(j => filter === 'all' || j.status === filter);
  const sorted = [...filtered].sort((a,b) => {
    const av = a[sortKey], bv = b[sortKey];
    const d = typeof av === 'string' ? av.localeCompare(bv) : (av - bv);
    return sortDir === 'asc' ? d : -d;
  });

  function setSort(k) {
    if (sortKey === k) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortKey(k); setSortDir('desc'); }
  }

  function Th({ k, children, align }) {
    const sorted = sortKey === k;
    return <th className={cls('sortable', sorted && 'sorted', align === 'right' && 'num')} onClick={()=>setSort(k)}>
      <span className="row" style={{ gap: 4, justifyContent: align === 'right' ? 'flex-end' : 'flex-start' }}>
        {children}
        {sorted && <Icon name={sortDir==='desc'?'down':'up'} size={10}/>}
      </span>
    </th>;
  }

  return <>
    <div className="page-head">
      <div>
        <h1 className="page-title">Prediction history</h1>
        <div className="page-desc">{filtered.length} jobs · sort and filter to review past scans</div>
      </div>
      <div className="page-actions">
        <Button variant="default" size="md" icon="download">Export list</Button>
        <Button variant="primary" size="md" icon="upload" onClick={() => onNavigate('upload')}>New scan</Button>
      </div>
    </div>

    <Panel padding={false}>
      <div className="stat-strip">
        <div className="stat"><span className="stat-label">Total jobs</span><span className="stat-value">{data.jobs.length}</span></div>
        <div className="stat"><span className="stat-label">Completed</span><span className="stat-value" style={{ color: 'var(--ok)' }}>{data.jobs.filter(j=>j.status==='completed').length}</span></div>
        <div className="stat"><span className="stat-label">Running</span><span className="stat-value" style={{ color: 'var(--accent)' }}>{data.jobs.filter(j=>j.status==='running').length}</span></div>
        <div className="stat"><span className="stat-label">Failed</span><span className="stat-value" style={{ color: 'var(--critical)' }}>{data.jobs.filter(j=>j.status==='failed').length}</span></div>
        <div className="stat"><span className="stat-label">Rows processed</span><span className="stat-value">{fmtN(data.jobs.reduce((s,j)=>s+j.rows,0))}</span></div>
        <div className="stat"><span className="stat-label">Avg attack rate</span><span className="stat-value">{fmtPct(data.jobs.reduce((s,j)=>s+j.attackRate,0)/data.jobs.length)}</span></div>
        <div style={{ marginLeft: 'auto' }} className="row">
          <span className="subtle" style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em' }}>filter</span>
          <div className="tweak-chips">
            {['all','completed','running','failed'].map(f => (
              <button key={f} className={cls('tweak-chip', filter===f && 'on')} onClick={()=>setFilter(f)}>{f}</button>
            ))}
          </div>
        </div>
      </div>

      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr>
            <Th k="status">Status</Th>
            <Th k="id">Job</Th>
            <Th k="filename">File</Th>
            <Th k="slice">Slice</Th>
            <Th k="rows" align="right">Rows</Th>
            <Th k="attacks" align="right">Attacks</Th>
            <Th k="attackRate" align="right">Attack rate</Th>
            <Th k="duration" align="right">Duration</Th>
            <Th k="created">Created</Th>
            <th>Flags</th>
            <th></th>
          </tr></thead>
          <tbody>
            {sorted.map(j => (
              <tr key={j.id} className="clickable" onClick={() => onNavigate('results')}>
                <td>
                  <Badge tone={j.status==='completed'?'ok':j.status==='running'?'accent':'critical'} dot>
                    {j.status}
                  </Badge>
                </td>
                <td className="mono">{j.id}</td>
                <td className="truncate" style={{ maxWidth: 240 }}>{j.filename}</td>
                <td><span className="mono muted">{j.slice}</span></td>
                <td className="num">{fmtN(j.rows)}</td>
                <td className="num">{fmtN(j.attacks)}</td>
                <td className="num">
                  <div className="row" style={{ justifyContent: 'flex-end', gap: 6 }}>
                    <div style={{ width: 40, height: 3, background: 'var(--bg-subtle)', borderRadius: 2 }}>
                      <div style={{ width: `${j.attackRate*100}%`, height: '100%', background: j.attackRate > 0.3 ? 'var(--critical)' : 'var(--accent)', borderRadius: 2 }}/>
                    </div>
                    <span>{fmtPct(j.attackRate)}</span>
                  </div>
                </td>
                <td className="num muted">{fmtDur(j.duration)}</td>
                <td className="muted">{fmtDate(j.created)}</td>
                <td>
                  <div className="row" style={{ gap: 4 }}>
                    {j.drift && <Badge tone="warn">drift</Badge>}
                    {j.fairness && <Badge tone="warn">fairness</Badge>}
                  </div>
                </td>
                <td><Icon name="arrow" size={14} className="muted"/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Panel>
  </>;
}

Object.assign(window, { UploadPage, HistoryPage });

      </div>

      <div className="span-4">
        {!selected ? (
          <Panel title="Select a row" subtitle="to view SHAP explanation">
            <div className="empty">
              <Icon name="results" size={24} className="muted" style={{ marginBottom: 8 }}/>
              <div>Click any prediction in the table to inspect feature attribution.</div>
            </div>
          </Panel>
        ) : (
          <SHAPCard p={selected} shap={data.shap}/>
        )}
      </div>
    </div>
  </>;
}

function SHAPCard({ p, shap }) {
  const maxAbs = Math.max(...shap.map(s => s.abs));
  return (
    <Panel title="SHAP · feature attribution" subtitle={`row ${p.row} · ${p.clsLabel}`}
      actions={<Badge tone="accent">{p.conf.toFixed(4)}</Badge>}>
      <div style={{ fontSize: 11, color: 'var(--fg-muted)', marginBottom: 10 }}>
        Why this row was classified as <b>{p.clsLabel}</b>. Red bars increase attack score; green decrease it.
      </div>
      <div className="row" style={{ justifyContent: 'space-between', fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--fg-subtle)', marginBottom: 4 }}>
        <span>benign</span><span>base = 0.203</span><span>malicious</span>
      </div>
      {shap.map((s,i) => {
        const pctAbs = (s.abs/maxAbs)*48;
        return <div key={i} className="shap-row">
          <div className="shap-label">{s.feature}</div>
          <div className="shap-bar">
            {s.value > 0 && <div className="shap-bar-pos" style={{ width: pctAbs+'%' }}/>}
            {s.value < 0 && <div className="shap-bar-neg" style={{ width: pctAbs+'%' }}/>}
          </div>
          <div className="shap-val">{s.value > 0 ? '+' : ''}{s.value.toFixed(3)}</div>
        </div>;
      })}
      <div className="divider"/>
      <div className="panel-sub" style={{ textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Flow metadata</div>
      <div className="mono" style={{ fontSize: 11, lineHeight: 1.8 }}>
        <div className="row"><span className="muted">src</span><span style={{ marginLeft: 'auto' }}>{p.src}</span></div>
        <div className="row"><span className="muted">dst</span><span style={{ marginLeft: 'auto' }}>{p.dst}</span></div>
        <div className="row"><span className="muted">proto</span><span style={{ marginLeft: 'auto' }}>{p.proto}</span></div>
        <div className="row"><span className="muted">slice</span><span style={{ marginLeft: 'auto' }}>{p.slice}</span></div>
        <div className="row"><span className="muted">bytes</span><span style={{ marginLeft: 'auto' }}>{p.bytes.toLocaleString()}</span></div>
        <div className="row"><span className="muted">packets</span><span style={{ marginLeft: 'auto' }}>{p.pkts}</span></div>
      </div>
      <div className="row" style={{ marginTop: 12, gap: 6, flexWrap: 'wrap' }}>
        <Button variant="danger" size="sm">Isolate host</Button>
        <Button variant="default" size="sm">Watchlist</Button>
        <Button variant="ghost" size="sm">False positive</Button>
      </div>
    </Panel>
  );
}

function DriftPage({ data }) {

      <Icon name="warn" size={16}/>
      <div>
        <div className="alert-title">Concept drift detected · job_3319</div>
        <div className="alert-body">Kolmogorov–Smirnov test flagged 3 of 24 monitored features (p &lt; 0.05). Autoencoder-6g-v1.4 may be stale.</div>
      </div>
      <div className="alert-actions">
        <Button variant="ghost" size="sm">Trigger retrain</Button>

              <th className="num">p-value</th>
              <th>Distribution</th>
              <th>Status</th>
            </tr></thead>
            <tbody>
              {data.drift.features.map(f => (
                <tr key={f.name}>
                  <td><span className="mono">{f.name}</span></td>

                  <td>
                    <div style={{ width: 120, height: 18, position: 'relative' }}>
                      <Sparkline data={Array.from({length: 20}, (_,i) => Math.sin(i/2 + (f.drifted?1:0)) + Math.random()*0.3)} stroke={f.drifted?'var(--critical)':'var(--fg-subtle)'} fill={true} height={18}/>
                    </div>
                  </td>
                  <td>

      <div className="span-5">

        <div style={{ height: 12 }}/>

            <div className="row" style={{ justifyContent: 'space-between' }}><span className="muted">14:32:18</span><span>admin@sentra.io · threshold.update</span></div>

}

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "role": "admin"
}/*EDITMODE-END*/;

function App() {
  const [theme, setTheme] = useState(TWEAK_DEFAULTS.theme);
  const [role, setRole] = useState(TWEAK_DEFAULTS.role);
  const [authed, setAuthed] = useState(false);
  const [route, setRoute] = useState('dashboard');

  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  useEffect(() => {
    const keys = NAV_BY_ROLE[role].filter(i => !i.section).map(i => i.key);
    if (!keys.includes(route)) setRoute(keys[0]);
  }, [role]);

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function persist(edits) {
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch (e) {}
  }

  const user = {
    analyst: { name: 'Leïla Ben Amor', email: 'leila.ba@sentra.io' },
    admin: { name: 'Admin User', email: 'admin@sentra.io' },
    ml_engineer: { name: 'Yuki Tanaka', email: 'y.tanaka@sentra.io' },
  }[role];

  if (!authed) {
    return <LoginScreen onLogin={()=>setAuthed(true)} role={role} setRole={(r)=>{setRole(r); persist({role:r});}} theme={theme}/>;
  }

  const crumbMap = {
    dashboard: ['Workspace','Dashboard'],
    upload: ['Workspace','New scan'],
    history: ['Workspace','History'],
    results: ['Workspace','Results','job_83eb'],
    users: ['Administration','Users'],
    settings: ['Administration','Thresholds'],
    drift: ['Administration','Drift & fairness'],
    model: ['Models','Registry'],
  };

  return (
    <div className="app" data-screen-label={route}>
      <Sidebar route={route} setRoute={setRoute} role={role} user={user} onSignOut={()=>setAuthed(false)}/>

        <Topbar crumbs={crumbMap[route] || [route]}/>

          {route === 'dashboard' && <DashboardPage data={SENTRA_DATA} threshold={threshold} onNavigate={setRoute}/>}
          {route === 'upload' && <UploadPage data={SENTRA_DATA} onNavigate={setRoute}/>}
          {route === 'history' && <HistoryPage data={SENTRA_DATA} onNavigate={setRoute}/>}
          {route === 'results' && <ResultsPage data={SENTRA_DATA} onNavigate={setRoute}/>}
          {route === 'users' && <UsersPage data={SENTRA_DATA}/>}
          {route === 'settings' && <SettingsPage threshold={threshold} setThreshold={setThreshold}
            sliceThresholds={sliceThresholds} setSliceThresholds={setSliceThresholds}/>}
          {route === 'drift' && <DriftPage data={SENTRA_DATA}/>}
          {route === 'model' && <ModelPage/>}

        <div className="tweaks-panel">

            <button className="icon-btn" style={{ width: 20, height: 20 }} onClick={()=>setTweaksOpen(false)}><Icon name="x" size={12}/></button>
          </div>
          <div className="tweak-row">
            <span className="muted">Theme</span>
            <div className="tweak-chips">
              {['light','dark'].map(t => (
                <button key={t} className={cls('tweak-chip', theme===t && 'on')}

              ))}
            </div>
          </div>
          <div className="tweak-row">
            <span className="muted">Role</span>
            <div className="tweak-chips">
              {[['analyst','analyst'],['admin','admin'],['ml_engineer','ML eng']].map(([v,l]) => (

              ))}
            </div>
          </div>
          <div className="divider"/>

            role switches sidebar menu · threshold slider on Settings alters KPIs
          </div>
        </div>
      )}
    </div>
  );
}
